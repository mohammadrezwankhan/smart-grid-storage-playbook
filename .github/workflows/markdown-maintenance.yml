name: Model and Markdown validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**.md"
      - "**.py"
      - "models/**/*.csv"
      - ".github/workflows/markdown-maintenance.yml"
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "**.py"
      - "models/**/*.csv"
      - ".github/workflows/markdown-maintenance.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test executable models
        run: python -m unittest discover -s tests -v

      - name: Run storage standing-loss reference
        run: >-
          python models/energy_limits.py
          --active-mw 0 --duration-minutes 120
          --energy-capacity-mwh 100 --initial-soc 0.8
          --auxiliary-load-mw 2 --self-discharge-rate-per-hour 0.01

      - name: Run energy throughput reference
        run: >-
          python models/energy_sequence.py
          --active-mw-profile 50,50,50,-40
          --duration-minutes-profile 15,15,15,30
          --energy-capacity-mwh 100 --initial-soc 0.5
          --minimum-soc 0.2 --charge-efficiency 0.8
          --discharge-efficiency 1

      - name: Run sustained reserve headroom reference
        run: >-
          python models/reserve_headroom.py
          --baseline-active-mw 10 --duration-minutes 30
          --maximum-discharge-mw 100 --maximum-charge-mw 100
          --energy-capacity-mwh 100 --initial-soc 0.5
          --minimum-soc 0.2 --maximum-soc 0.8
          --charge-efficiency 1 --discharge-efficiency 1
          --reactive-mvar 80 --limit-mva 100

      - name: Run P-Q constrained reserve sequence
        run: >-
          python models/reserve_sequence.py
          --baseline-active-mw-profile 10,10
          --interval-duration-minutes-profile 15,15
          --response-duration-minutes 30
          --maximum-discharge-mw 100 --maximum-charge-mw 100
          --energy-capacity-mwh 1000 --initial-soc 0.5
          --reactive-mvar 80 --limit-mva 100

      - name: Run sampled capability envelope
        run: >-
          python models/pq_capability.py
          --active-mw 80 --reactive-mvar 80
          --curve-csv models/data/illustrative_capability_curve.csv
          --priority active

      - name: Run directional capability envelope
        run: >-
          python models/pq_capability.py
          --active-mw -65 --reactive-mvar -70
          --directional-curve-csv
          models/data/illustrative_directional_capability.csv
          --priority active

      - name: Run external temperature power derating
        run: >-
          python models/temperature_derating.py
          --active-mw -90 --temperature-c 40
          --max-discharge-mw 80 --max-charge-mw 100
          --curve-csv models/data/illustrative_temperature_derating.csv

      - name: Run directional grid-support sequence
        run: >-
          python models/grid_support_sequence.py
          --frequency-hz-profile 49.5,49.5,50.5,50.5
          --voltage-pu-profile 0.95,1.05,0.95,1.05
          --duration-minutes-profile 1,1,1,1
          --directional-curve-csv
          models/data/illustrative_directional_capability.csv
          --energy-capacity-mwh 1000 --initial-soc 0.5
          --charge-efficiency 1 --discharge-efficiency 1
          --priority reactive

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md CONTRIBUTING.md models/*.md concepts/*.md checklists/*.md glossary/*.md diagrams/*.md
          fail: true
