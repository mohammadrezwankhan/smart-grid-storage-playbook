name: Model and Markdown validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**.md"
      - "**.py"
      - "models/**/*.csv"
      - ".github/workflows/markdown-maintenance.yml"
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "**.py"
      - "models/**/*.csv"
      - ".github/workflows/markdown-maintenance.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test executable models
        run: python -m unittest discover -s tests -v

      - name: Run sampled capability envelope
        run: >-
          python models/pq_capability.py
          --active-mw 80 --reactive-mvar 80
          --curve-csv models/data/illustrative_capability_curve.csv
          --priority active

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md CONTRIBUTING.md models/*.md concepts/*.md checklists/*.md glossary/*.md diagrams/*.md
          fail: true
